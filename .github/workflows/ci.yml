name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test (race)
        run: go test -race ./...
      - name: Coverage policy
        run: |
          go install github.com/felixgeelhaar/coverctl@latest
          coverctl --ci check

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # nox lives in a private repo: the job runs when a NOX_PAT secret
      # grants access and is a no-op otherwise (local enforcement stays:
      # `nox install-hook`).
      - name: nox scan (fail on unwaived)
        env:
          NOX_PAT: ${{ secrets.NOX_PAT }}
        run: |
          if [ -z "$NOX_PAT" ]; then
            echo "NOX_PAT secret not configured — skipping security scan (enforced locally via pre-commit hook)."
            exit 0
          fi
          git config --global url."https://${NOX_PAT}@github.com/".insteadOf "https://github.com/"
          GOPRIVATE=github.com/felixgeelhaar/nox go install github.com/felixgeelhaar/nox/cmd/nox@latest
          nox scan . --vex vex.json -fail-on-unwaived

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: go build ./...
      - name: goreleaser config check
        uses: goreleaser/goreleaser-action@v6
        with:
          args: check
